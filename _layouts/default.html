<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}
    </title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        options: {
          skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"]
        }
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    {% seo %}
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="logo" href="{{ '/' | relative_url }}">ALEX<span>LAB</span></a>
        <nav class="main-nav">
          <a href="{{ '/project/' | relative_url }}">Project</a>
          <div class="menu-group">
            <a href="{{ '/blog/' | relative_url }}">Blog</a>
            <div class="mega-menu">
              {% for top in site.data.blog_taxonomy %}
              <section>
                <h4>{{ top.name }}</h4>
                <ul>
                  {% for sub in top.children %}
                  <li>
                    <a href="{{ '/blog/' | append: top.slug | append: '/' | append: sub.slug | append: '/' | relative_url }}">
                      {{ sub.name }}
                    </a>
                  </li>
                  {% endfor %}
                </ul>
              </section>
              {% endfor %}
            </div>
          </div>
          <a href="{{ '/about/' | relative_url }}">About Me</a>
          <a href="{{ '/info/' | relative_url }}">기타 정보</a>
        </nav>
        <button id="themeToggle" class="theme-toggle" aria-label="테마 변경">🌙</button>
      </div>
    </header>

    <main class="container page">{{ content }}</main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© <span id="year"></span> {{ site.title }}. Built with GitHub Pages + Jekyll.</p>
        <div class="footer-links">
          <a href="{{ '/blog/' | relative_url }}">Blog</a>
          <a href="{{ '/tags/' | relative_url }}">Tags</a>
          <a href="https://github.com/alex50027319/alex50027319.github.io">View Source</a>
        </div>
      </div>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </body>
</html>
